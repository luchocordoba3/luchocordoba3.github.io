  try { const s = localStorage.getItem(STORAGE_KEY); if (s) return JSON.parse(s); } catch {}
  return DEFAULT_PRODUCTS.map(p => ({ ...p }));
}
function saveProducts(prods) { localStorage.setItem(STORAGE_KEY, JSON.stringify(prods)); }
function resetProducts() { saveProducts(DEFAULT_PRODUCTS.map(p => ({ ...p }))); return loadProducts(); }

const fmt = n => '$' + Math.round(n).toLocaleString('es-AR');
const catOf = k => CATS.find(c => c.key === k);
const uid = () => Math.random().toString(36).slice(2, 9);

function buildVM(p) {
  const c = catOf(p.cat) || CATS[0];
  const comm = p.comm || 0;
  const earn = Math.round(p.price * comm / 100);
  const off = (p.old && p.old > 0) ? Math.round((1 - p.price / p.old) * 100) : 0;
  return {
    ...p,
    catLabel: c.label, tint: c.tint,
    priceStr: fmt(p.price),
    hasOld: !!(p.old && p.old > 0), oldStr: (p.old && p.old > 0) ? fmt(p.old) : '',
    off, hasOff: off > 0, offStr: `-${off}%`,
    showPrem: !p.best && !!p.premium,
    hasSold: !!(p.sold && p.sold.trim()),
    comm, totalStr: `${comm}%`, earn, earnStr: fmt(earn),
    url: p.affiliateUrl || '#',
  };
}

const COMPARATORS = {
  recomendado: (a,b) => (b.best-a.best)||(b.hasSold-a.hasSold)||(b.off-a.off)||(a.price-b.price),
  vendidos:    (a,b) => (b.best-a.best)||(b.hasSold-a.hasSold)||(b.price-a.price),
  descuento:   (a,b) => (b.off-a.off)||(a.price-b.price),
  precio:      (a,b) => (a.price-b.price),
  comision:    (a,b) => (b.comm-a.comm)||(b.earn-a.earn),
  ganancia:    (a,b) => (b.earn-a.earn),
};

function setState(patch) { state = { ...state, ...patch }; render(); }
function setView(v) {
  setState({ view: v, sort: v === 'home' ? 'recomendado' : 'vendidos' });
  requestAnimationFrame(() => window.scrollTo({ top: 0, behavior: 'smooth' }));
}
function setSort(s) { setState({ sort: s }); }

function onLogoClick() {
  logoClickCount++;
  clearTimeout(logoClickTimer);
  if (logoClickCount >= LOGO_CLICKS_NEEDED) {
    logoClickCount = 0;
    if (!adminState.loggedIn) adminState = { ...adminState, open: false, modal: 'login' };
    else adminState = { ...adminState, open: true, modal: null };
    render();
    return;
  }
  logoClickTimer = setTimeout(() => { logoClickCount = 0; }, 800);
}

  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === 'class') e.className = v;
    else if (k === 'style') Object.assign(e.style, v);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }
  for (const c of children.flat(Infinity)) {
    if (c == null || c === false) continue;
    e.append(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

      ),
      !it.image && h('span', { class: 'card-img-label' }, 'FOTO ML'),
    ),
    h('div', { class: 'card-body' },
      h('span', { class: 'card-cat' }, it.catLabel),
      h('h3', { class: 'card-name' }, it.name),
      it.hasSold && h('span', { class: 'card-sold' }, it.sold),
      h('div', { class: 'price-row' },
        h('span', { class: 'price' }, it.priceStr),
        it.hasOld && h('span', { class: 'price-old' }, it.oldStr),
      ),
      h('span', { class: 'free-ship' }, 'ГўЕ“вҖң EnvГғВӯo gratis'),
      h('a', { class: 'cta', href: it.url, target: '_blank', rel: 'noopener noreferrer' }, 'Ver en Mercado Libre ГўвҖ вҖҷ'),
    ),
  );
}

  const inp = h('input', { type: 'password', placeholder: 'ContraseГғВұa', style: { marginBottom: '14px' } });
  const err = h('p', { class: 'error-msg', style: { display: 'none' } }, 'ContraseГғВұa incorrecta.');
  function tryLogin() {

  }
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
  return h('div', { class: 'overlay', onClick: e => { if (e.target === e.currentTarget) { adminState.modal = null; render(); } } },
    h('div', { class: 'modal' },
      h('div', { class: 'modal-head' },
        h('p', { class: 'modal-title' }, 'Acceso admin'),
        h('p', { class: 'modal-sub' }, 'IngresГғВЎ tu contraseГғВұa para continuar.'),
      ),
      h('div', { class: 'modal-body' },
        h('div', { class: 'field' }, h('label', null, 'CONTRASEГғвҖҳA'), inp),
        err,
        h('button', { class: 'btn btn-primary', onClick: tryLogin }, 'Entrar'),
      ),
    ),
  );
}

    const updated = {
      id: p.id, name, cat: fCat.value, price,
      old: parseFloat(fOld.value) || 0,
      comm: parseFloat(fComm.value) || 0,
      best: fBest.checked, premium: fPrem.checked,
      sold: fSold.value.trim(), affiliateUrl: url, image: fImg.value.trim(),
    };
    if (isEdit) { const idx = products.findIndex(x => x.id === p.id); if (idx !== -1) products[idx] = updated; }
    else products.push(updated);
    saveProducts(products); adminState.modal = null; render();
  }
  function remove() {
    if (!confirm(`ГӮВҝEliminar "${p.name}"?`)) return;
    products = products.filter(x => x.id !== p.id);
    saveProducts(products); adminState.modal = null; render();
  }

  return h('div', { class: 'overlay', onClick: e => { if (e.target === e.currentTarget) { adminState.modal = null; render(); } } },
    h('div', { class: 'modal', style: { maxWidth: '520px', maxHeight: '90vh', overflowY: 'auto' } },
      h('div', { class: 'modal-head' },
        h('p', { class: 'modal-title' }, isEdit ? 'Editar producto' : 'Agregar producto'),
        h('p', { class: 'modal-sub' }, 'Los cambios se guardan automГғВЎticamente en este dispositivo.'),
      ),
      h('div', { class: 'modal-body' },
        h('div', { class: 'field' }, h('label', null, 'NOMBRE'), fName),
        h('div', { class: 'field' }, h('label', null, 'CATEGORГғВҚA'), fCat),
        h('div', { class: 'field-row-3' },
          h('div', { class: 'field' }, h('label', null, 'PRECIO ($)'), fPrice),
          h('div', { class: 'field' }, h('label', null, 'P. ANTERIOR'), fOld),
          h('div', { class: 'field' }, h('label', null, 'COMISIГғвҖңN %'), fComm),
        ),
        h('div', { class: 'field-check' }, fBest, h('label', null, 'ГўЛңвҖҰ MГғВЎs vendido')),
        h('div', { class: 'field-check' }, fPrem, h('label', null, 'Ticket alto (Premium)')),
        h('div', { class: 'field' }, h('label', null, 'TEXTO DE VENTAS'), fSold),
        h('div', { class: 'field' }, h('label', null, 'LINK DE AFILIADO (meli.la)'), fUrl),
        h('div', { class: 'field' }, h('label', null, 'URL DE IMAGEN'), fImg, imgPreview),
        errEl,
        h('div', { class: 'modal-footer', style: { flexWrap: 'wrap' } },
          isEdit && h('button', { class: 'btn btn-danger btn-sm', onClick: remove }, 'Eliminar'),
          h('div', { style: { flex: '1' } }),
          h('button', { class: 'btn btn-ghost btn-sm', onClick: () => { adminState.modal = null; render(); } }, 'Cancelar'),
          h('button', { class: 'btn btn-accent btn-sm', onClick: save }, isEdit ? 'Guardar cambios' : 'Agregar'),
        ),
      ),
    ),
  );
}

//  ADMIN PANEL
// ГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗ
function AdminPanel() {
  const all = products.map(buildVM);
  const totalEarn = all.reduce((s, x) => s + x.earn, 0);
  const avgComm = all.length ? (all.reduce((s, x) => s + x.comm, 0) / all.length) : 0;

  const productList = CATS.map(c => {
    const items = all.filter(x => x.cat === c.key);
    if (!items.length) return null;
    return [
      h('p', { class: 'admin-section-title', style: { marginTop: '20px' } }, c.label.toUpperCase()),
      h('div', { class: 'product-list' },
        ...items.map(it =>
          h('div', { class: 'product-row' },
            it.image ? h('img', { class: 'product-row-img', src: it.image, alt: it.name }) : h('div', { class: 'product-row-img-placeholder' }, it.catLabel[0]),
            h('div', { class: 'product-row-info' },
              h('div', { class: 'product-row-name' },
                it.name,
                it.best && h('span', { class: 'tag tag-best' }, 'VENDIDO'),
                it.premium && h('span', { class: 'tag tag-prem' }, 'PREMIUM'),
              ),
              h('div', { class: 'product-row-meta' }, `${it.priceStr}  ГӮВ·  comisiГғВіn ${it.totalStr}  ГӮВ·  ganГғВЎs ~${it.earnStr}`),
            ),
            h('div', { class: 'product-row-actions' },
              h('a', { class: 'btn btn-ghost btn-sm', href: it.url, target: '_blank', rel: 'noopener' }, 'ГўвҖ вҖ”'),
              h('button', { class: 'btn btn-accent btn-sm', onClick: () => { adminState.modal = 'edit'; editingProduct = products.find(x => x.id === it.id); render(); } }, 'Editar'),
            ),
          )
        ),
      ),
    ];
  });

  const commTable = h('table', { class: 'comm-table' },
    h('thead', null, h('tr', null,
      h('th', null, 'CATEGORГғВҚA'), h('th', null, 'PRODUCTOS'), h('th', null, 'COMISIГғвҖңN PROM.'), h('th', null, 'GANANCIA TOTAL'),
    )),
    h('tbody', null,
      ...CATS.map(c => {
        const items = all.filter(x => x.cat === c.key);
        if (!items.length) return null;
        const ac = Math.round(items.reduce((s, x) => s + x.comm, 0) / items.length);
        const te = items.reduce((s, x) => s + x.earn, 0);
        return h('tr', null,
          h('td', null, c.label),
          h('td', null, String(items.length)),
          h('td', null, h('span', { class: 'comm-pct' }, `${ac}%`)),
          h('td', null, h('span', { class: 'comm-earn' }, `~${fmt(te)}`)),
        );
      }).filter(Boolean)
    ),
  );

  return h('div', { class: 'admin-panel' },
    h('div', { class: 'admin-topbar' },
      h('div', { class: 'admin-topbar-title' }, 'Selecto', h('span', null, '.'), ' ГўвӮ¬вҖқ Panel admin'),
      h('button', { class: 'btn btn-ghost btn-sm', style: { color: '#EEEAE1', borderColor: 'rgba(255,255,255,0.18)' }, onClick: () => { adminState.open = false; render(); } }, 'ГўвҖ Вҗ Volver al sitio'),
      h('button', { class: 'btn btn-danger btn-sm', onClick: () => { adminState.loggedIn = false; adminState.open = false; render(); } }, 'Cerrar sesiГғВіn'),
    ),
    h('div', { class: 'admin-body' },
      h('div', { class: 'kpi-row' },
        h('div', { class: 'kpi' }, h('div', { class: 'kpi-num' }, String(all.length)), h('div', { class: 'kpi-label' }, 'productos activos')),
        h('div', { class: 'kpi' }, h('div', { class: 'kpi-num' }, `${avgComm.toFixed(1)}%`), h('div', { class: 'kpi-label' }, 'comisiГғВіn promedio')),
        h('div', { class: 'kpi' }, h('div', { class: 'kpi-num green' }, `~${fmt(totalEarn)}`), h('div', { class: 'kpi-label' }, 'ganancia si se vende 1 de c/u')),
      ),
      h('p', { class: 'admin-section-title' }, 'GANANCIA POR CATEGORГғВҚA'),
      commTable,
      h('p', { class: 'admin-section-title' }, `PRODUCTOS (${all.length})`),
      ...productList.filter(Boolean).flat(),
      h('button', { class: 'admin-add-btn', style: { marginTop: '12px' }, onClick: () => { adminState.modal = 'add'; editingProduct = null; render(); } }, '+ Agregar producto'),
      h('div', { style: { marginTop: '28px', paddingTop: '20px', borderTop: '1px solid rgba(255,255,255,0.08)' } },
        h('button', { class: 'btn btn-ghost btn-sm', style: { color: '#938C80', borderColor: 'rgba(255,255,255,0.12)' }, onClick: () => { if (confirm('ГӮВҝRestaurar productos por defecto? Se perderГғВЎn todos los cambios.')) { products = resetProducts(); render(); } } }, 'Restaurar productos por defecto'),
      ),
    ),
  );
}

//  MAIN RENDER
// ГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗГўвҖўВҗ
function render() {
  const { view, sort } = state;
  const isHome = view === 'home';
  const all = products.map(buildVM);

  const SORT_DEFS = [
    { key: 'vendidos', label: 'MГғВЎs vendidos' },
    { key: 'precio', label: 'Menor precio' },
    { key: 'recomendado', label: 'Recomendado' },
  ];
  const effSort = SORT_DEFS.find(s => s.key === sort) ? sort : 'vendidos';

  const header = h('header', { class: 'header' },
    h('div', { class: 'header-top' },
      h('button', { class: 'wordmark', onClick: onLogoClick }, 'Selecto', h('span', { class: 'wordmark-dot' })),
      h('div', { style: { flex: '1' } }),
      h('span', { class: 'meta' }, "actualizado jun '26"),
    ),
    h('div', { class: 'cat-pills' },
      h('button', { class: `pill${view === 'home' ? ' active' : ''}`, onClick: () => setView('home') }, 'Todos'),
      ...CATS.map(c => h('button', { class: `pill${view === c.key ? ' active' : ''}`, onClick: () => setView(c.key) }, c.label)),
    ),
  );

  const homeContent = isHome ? h('main', null,
    h('section', { class: 'hero' },
      h('span', { class: 'hero-eyebrow' }, 'CURADURГғВҚA ГӮВ· MERCADO LIBRE ARGENTINA'),
      h('h1', null, 'Lo mejor de Mercado Libre, ', h('em', null, 'elegido a mano'), '.'),
      h('p', null, 'Los mГғВЎs vendidos, los de mejor precio y los de mayor descuento ГўвӮ¬вҖқ investigados y seleccionados, no spam. ComprГғВЎs directo en Mercado Libre.'),
      h('div', { class: 'stats' },
        h('div', null, h('div', { class: 'stat-num' }, String(all.length)), h('div', { class: 'stat-label' }, 'productos elegidos')),
        h('div', null, h('div', { class: 'stat-num' }, String(CATS.length)), h('div', { class: 'stat-label' }, 'categorГғВӯas')),
      ),
    ),
    h('div', { class: 'sections' },
      ...CATS.map(c => {
        const items = all.filter(x => x.cat === c.key).sort(COMPARATORS.recomendado);
        if (!items.length) return null;
        return h('section', { class: 'cat-section' },
          h('div', { class: 'section-head' },
            h('div', null, h('h2', null, c.label), h('div', { class: 'section-sub' }, `${items.length} productos seleccionados`)),
            h('button', { class: 'see-all', onClick: () => setView(c.key) }, `Ver todos (${items.length}) ГўвҖ вҖҷ`),
          ),
          h('div', { class: 'grid' }, ...items.slice(0, 6).map(Card)),
        );
      }).filter(Boolean),
    ),
  ) : null;

  const catContent = !isHome ? (() => {
    const c = catOf(view);
    if (!c) return null;
    const items = all.filter(x => x.cat === view).sort(COMPARATORS[effSort] || COMPARATORS.recomendado);
    return h('main', null,
      h('div', { class: 'cat-view' },
        h('button', { class: 'back-btn', onClick: () => setView('home') }, 'ГўвҖ Вҗ Volver a todo'),
        h('div', { class: 'cat-view-head' },
          h('h1', null, c.label),
          h('span', { class: 'cat-meta' }, `${items.length} productos`),
        ),
        h('div', { class: 'sort-bar' },
          h('span', { class: 'sort-label' }, 'Ordenar'),
          ...SORT_DEFS.map(s => h('button', { class: `sort-btn${s.key === effSort ? ' active' : ''}`, onClick: () => setSort(s.key) }, s.label)),
        ),
        h('div', { class: 'grid' }, ...items.map(Card)),
      ),
    );
  })() : null;

  const footer = h('footer', null,
    h('div', { class: 'footer-inner' },
      h('div', { class: 'footer-top' },
        h('div', null,
          h('div', { class: 'footer-wordmark' }, 'Selecto', h('span', null, '.')),
          h('p', { class: 'footer-legal' }, 'Esta pГғВЎgina contiene links de afiliados. Ganamos una comisiГғВіn si comprГғВЎs a travГғВ©s de nuestros links, sin costo adicional para vos. Precios y disponibilidad sujetos a cambios en Mercado Libre.'),
        ),
        h('div', { class: 'footer-cols' },
          h('div', { class: 'footer-col' }, h('span', { class: 'footer-col-title' }, 'SITIO'), h('button', { class: 'footer-link', onClick: () => setView('home') }, 'Inicio')),
          h('div', { class: 'footer-col' }, h('span', { class: 'footer-col-title' }, 'CATEGORГғВҚAS'), ...CATS.map(c => h('button', { class: 'footer-link', onClick: () => setView(c.key) }, c.label))),
        ),
      ),
      h('div', { class: 'footer-copy' }, 'ГӮВ© 2026 Selecto ГӮВ· Sitio independiente, no afiliado oficialmente a Mercado Libre S.A. ГӮВ· Hecho en Argentina'),
    ),
  );

  const app = document.getElementById('app');
  app.innerHTML = '';
  if (adminState.open) app.append(AdminPanel());
  else app.append(header, ...[homeContent, catContent, footer].filter(Boolean));
  if (adminState.modal === 'login') app.append(LoginModal());
  if (adminState.modal === 'add') app.append(ProductFormModal(null));
  if (adminState.modal === 'edit' && editingProduct) app.append(ProductFormModal(editingProduct));
}

render();
</script>
